<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Explainer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Error Explainer</h1>
        <p class="subtitle">Enter a Python error name to understand it</p>

        <form action="/result" method="post" class="form-box">
            <input type="text" name="error" placeholder="e.g. IndexError" required>
            <button type="submit">Explain Error</button>
        </form>

        <div class="examples">
            <h3>Try these examples:</h3>
            <ul>
                <li>IndexError</li>
                <li>TypeError</li>
                <li>NameError</li>
                <li>ZeroDivisionError</li>
                <li>KeyError</li>
                <li>SyntaxError</li>
            </ul>
        </div>
    </div>
</body>
</html>
