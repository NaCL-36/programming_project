<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/error-search">Error Search</a>
        <a href="/code-analyzer">Code Analyzer</a>
        <a href="/about">About</a>

    <div class="page-wrapper">
        <div class="hero-card fade-in">
            <h1>Code Analyzer</h1>

            <form action="/analyze" method="post" class="search-form-column">

            </form>
        </div>
    </div>
</body>
